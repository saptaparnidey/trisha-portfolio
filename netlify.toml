# Netlify configuration for the Trisha Halder portfolio.
#
# Netlify builds the static site from source on every Git push:
#   1. npm install
#   2. npm run publish-site  (generates dist/ from data/content.json + templates)
#   3. Netlify publishes the dist/ folder
#
# The admin panel (Express server) is NOT deployed to Netlify.
# Trisha edits locally, then pushes to GitHub to update the live site.

[build]
  command = "npm run publish-site"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
